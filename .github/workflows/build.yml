name: Build TakeFive FFmpeg

on:
  push:
    branches: [ "main" ]
    paths:
      - 'scripts/**'
      - 'build_takefive.sh'
      - 'patch_ffmpeg.sh'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS arm64
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install autoconf automake libtool pkg-config nasm

    - name: Full Dynamic Build
      run: |
        chmod +x *.sh scripts/*.sh
        ./build_takefive.sh \
          --enable-libmp3lame \
          --enable-libopenh264

    - name: Package Artifacts
      run: |
        mkdir -p artifacts
        zip -r artifacts/takefive-ffmpeg-ios-arm64.zip takefive_prebuilt/arm64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-ios-arm64
        path: artifacts/takefive-ffmpeg-ios-arm64.zip
