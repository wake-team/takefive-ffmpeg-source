name: Build TakeFive FFmpeg

on:
  push:
    tags:
      - 'v*'
    branches: [ "main" ]
    paths:
      - 'scripts/**'
      - 'build_takefive.sh'
      - 'patch_ffmpeg.sh'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0) — leave blank to skip release creation'
        required: false
        default: ''

jobs:
  build-ios:
    name: Build iOS arm64
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install autoconf automake libtool pkg-config nasm

    - name: Full Dynamic Build
      run: |
        chmod +x *.sh scripts/*.sh
        ./build_takefive.sh \
          --enable-libmp3lame \
          --enable-libopenh264

    - name: Package Artifacts
      run: |
        mkdir -p artifacts
        tar -czf artifacts/takefive_prebuilt.tar.gz takefive_prebuilt/
        zip -r artifacts/takefive-ffmpeg-ios-arm64.zip takefive_prebuilt/arm64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-ios-arm64
        path: artifacts/

    - name: Determine release version
      id: version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "create_release=true" >> "$GITHUB_OUTPUT"
        elif [[ -n "${{ github.event.inputs.version }}" ]]; then
          echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "create_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "create_release=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub Release
      if: steps.version.outputs.create_release == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        gh release create "${TAG}" \
          --title "TakeFive FFmpeg Kit ${TAG}" \
          --notes "Prebuilt FFmpeg static libraries for iOS arm64 (FFmpeg 6.0, libmp3lame, libopenh264)" \
          artifacts/takefive_prebuilt.tar.gz \
          artifacts/takefive-ffmpeg-ios-arm64.zip
