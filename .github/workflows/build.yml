name: Build TakeFive FFmpeg

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS XCFramework
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install autoconf automake libtool pkg-config

    - name: Build iOS (LGPL Minimal - ARM64 Only)
      run: |
        chmod +x *.sh scripts/*.sh
        export cross_compiling=yes
        # Build for ARM64 (Device) and ARM64-Simulator (Apple Silicon Mac)
        # Disabling all Intel/Legacy architectures to ensure success
        ./ios.sh -x --enable-ios-videotoolbox --enable-ios-avfoundation \
          --disable-x86-64 --disable-i386 --disable-armv7 --disable-armv7s \
          --disable-arm64e --disable-arm64-mac-catalyst --disable-x86-64-mac-catalyst \
          --target=15.1 || (cat build.log && exit 1)

    - name: Package XCFrameworks
      run: |
        cd prebuilt/apple-xcframework
        zip -r takefive-ffmpeg-ios.zip *.xcframework

    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-ios
        path: prebuilt/apple-xcframework/takefive-ffmpeg-ios.zip

  build-android:
    name: Build Android AAR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config

    - name: Build Android (LGPL Minimal)
      run: |
        chmod +x *.sh scripts/*.sh
        export cross_compiling=yes
        # Using pre-installed NDK on GitHub Ubuntu runner
        export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
        ./android.sh --disable-x86 --api=26 || (cat build.log && exit 1)

    - name: Package Android Artifact
      run: |
        find prebuilt -name "*.aar" -exec cp {} ffmpeg-kit-android.aar \; || echo "No AAR yet"

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-android
        path: |
          ffmpeg-kit-android.aar
          prebuilt/**/*.aar
