name: Build TakeFive FFmpeg

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS XCFramework
    runs-on: macos-13

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install autoconf automake libtool pkg-config

    - name: Build iOS (LGPL Minimal)
      run: |
        chmod +x *.sh scripts/*.sh
        export cross_compiling=yes
        ./ios.sh -x --enable-ios-videotoolbox --enable-ios-avfoundation --disable-armv7 --disable-armv7s --disable-arm64e --disable-i386 --disable-arm64-mac-catalyst --disable-x86-64-mac-catalyst --target=15.1

    - name: Package XCFrameworks
      run: |
        cd prebuilt/apple-xcframework
        zip -r takefive-ffmpeg-ios.zip *.xcframework

    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-ios
        path: prebuilt/apple-xcframework/takefive-ffmpeg-ios.zip

  build-android:
    name: Build Android AAR
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android NDK
      run: |
        echo "y" | sudo /usr/local/lib/android/sdk/tools/bin/sdkmanager --install "ndk;25.1.8937393" --sdk_root=/usr/local/lib/android/sdk
        echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config

    - name: Build Android (LGPL Minimal)
      run: |
        chmod +x *.sh scripts/*.sh
        export cross_compiling=yes
        ./android.sh --disable-arm-v7a-neon --disable-x86 --api=26

    - name: Package Android Artifact
      run: |
        # Finding the aar file might depend on the specific ffmpeg-kit output structure
        find prebuilt -name "*.aar" -exec cp {} ffmpeg-kit-android.aar \;

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-android
        path: ffmpeg-kit-android.aar
