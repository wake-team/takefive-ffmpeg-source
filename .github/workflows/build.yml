name: Build TakeFive FFmpeg

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version — reads from package.json if blank'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android arm64-v8a
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          autoconf automake libtool pkg-config nasm make git curl

    - name: Install Android NDK
      run: |
        NDK_VERSION=27.2.12479018
        echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "ndk;${NDK_VERSION}"
        echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

    - name: Build Android arm64-v8a
      run: |
        chmod +x *.sh scripts/*.sh
        ./build_takefive_android.sh \
          --enable-libmp3lame \
          --enable-libopenh264 \
          --enable-libfreetype

    - name: Package Artifacts
      run: |
        mkdir -p artifacts
        tar -czf artifacts/takefive-ffmpeg-android-arm64.tar.gz takefive_prebuilt_android/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-android-arm64
        path: artifacts/

  build-ios:
    name: Build iOS arm64
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install autoconf automake libtool pkg-config nasm

    - name: Full Dynamic Build
      run: |
        chmod +x *.sh scripts/*.sh
        ./build_takefive.sh \
          --enable-libmp3lame \
          --enable-libopenh264 \
          --enable-libfreetype

    - name: Diagnose freetype pkg-config
      if: always()
      run: |
        echo "=== PKG_CONFIG_PATH ==="
        echo "${PKG_CONFIG_PATH}"

        PC_FILE="takefive_prebuilt/dependencies/libfreetype/lib/pkgconfig/freetype2.pc"
        echo ""
        echo "=== freetype2.pc ==="
        if [ -f "${PC_FILE}" ]; then
          cat "${PC_FILE}"
        else
          echo "FILE NOT FOUND at ${PC_FILE}"
          echo "Contents of pkgconfig dir (if exists):"
          ls takefive_prebuilt/dependencies/libfreetype/lib/pkgconfig/ 2>/dev/null || echo "  dir missing"
        fi

        echo ""
        echo "=== pkg-config check ==="
        PKG_CONFIG_PATH="takefive_prebuilt/dependencies/libfreetype/lib/pkgconfig:${PKG_CONFIG_PATH}" \
          pkg-config --exists freetype2 && echo "pkg-config OK" || echo "pkg-config FAILED"
        PKG_CONFIG_PATH="takefive_prebuilt/dependencies/libfreetype/lib/pkgconfig:${PKG_CONFIG_PATH}" \
          pkg-config --cflags --libs freetype2 2>&1 || true

    - name: Package Artifacts
      run: |
        mkdir -p artifacts
        tar -czf artifacts/takefive_prebuilt.tar.gz takefive_prebuilt/
        zip -r artifacts/takefive-ffmpeg-ios-arm64.zip takefive_prebuilt/arm64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-ios-arm64
        path: artifacts/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download iOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: takefive-ffmpeg-ios-arm64
        path: artifacts/

    - name: Download Android Artifact
      uses: actions/download-artifact@v4
      with:
        name: takefive-ffmpeg-android-arm64
        path: artifacts/

    - name: Determine release version
      id: version
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        elif [[ -n "${{ github.event.inputs.version }}" ]]; then
          echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          PKG_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "tag=v${PKG_VERSION}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        gh release create "${TAG}" \
          --title "TakeFive FFmpeg Kit ${TAG}" \
          --notes "Prebuilt FFmpeg static libraries for iOS arm64 and Android arm64-v8a (FFmpeg 6.0, libmp3lame, libopenh264, libfreetype)" \
          artifacts/takefive_prebuilt.tar.gz \
          artifacts/takefive-ffmpeg-ios-arm64.zip \
          artifacts/takefive-ffmpeg-android-arm64.tar.gz
