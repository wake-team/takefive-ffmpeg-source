name: Build TakeFive FFmpeg

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS XCFramework
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install autoconf automake libtool pkg-config

    - name: Build iOS (LGPL Minimal - ARM64 Only)
      run: |
        chmod +x *.sh scripts/*.sh
        export cross_compiling=yes
        ./ios.sh -x --enable-ios-videotoolbox --enable-ios-avfoundation \
          --disable-x86-64 --disable-i386 --disable-armv7 --disable-armv7s \
          --disable-arm64e --disable-arm64-mac-catalyst --disable-x86-64-mac-catalyst \
          --target=15.1 || (cat build.log && exit 1)

    - name: Package XCFrameworks
      run: |
        mkdir -p artifacts/ios
        find prebuilt -name "*.xcframework" -type d -exec cp -R {} artifacts/ios/ \;
        cd artifacts/ios
        zip -r ../../takefive-ffmpeg-ios.zip .
        cd ../..

    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-ios
        path: takefive-ffmpeg-ios.zip

  build-android:
    name: Build Android AAR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup NDK r25c
      run: |
        # Use the pre-installed sdkmanager to force install r25c
        echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" --sdk_root=${ANDROID_HOME}
        echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config

    - name: Build Android (LGPL Minimal)
      run: |
        chmod +x *.sh scripts/*.sh
        export cross_compiling=yes
        # Explicitly pass the NDK path to FFmpegKit scripts
        export ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/25.2.9519653
        ./android.sh --disable-x86 --api-level=26 || (cat build.log && exit 1)

    - name: Package Android Artifacts
      run: |
        mkdir -p artifacts/android
        find prebuilt -name "*.aar" -exec cp {} artifacts/android/ \;
        if [ -z "\$(ls -A artifacts/android)" ]; then
          find prebuilt -name "*.so" -exec cp {} artifacts/android/ \;
        fi
        cd artifacts/android
        zip -r ../../takefive-ffmpeg-android.zip .
        cd ../..

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: takefive-ffmpeg-android
        path: takefive-ffmpeg-android.zip
